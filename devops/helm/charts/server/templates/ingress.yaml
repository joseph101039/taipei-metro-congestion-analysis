apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metro-server-ingress
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.domain.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metro-server
                port:
                  number: 3000
